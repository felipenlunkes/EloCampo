spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
          - id: auth-service
            uri: http://localhost:8080
            predicates:
              - Path=/rest/v1/token,/rest/v1/user/**
          - id: account-service
            uri: http://localhost:8081
            predicates:
              - Path=/rest/v1/account/**
          - id: product-service
            uri: http://localhost:8082
            predicates:
              - Path=/rest/v1/product/**
          - id: order-service
            uri: http://localhost:8083
            predicates:
              - Path=/rest/v1/order/**
          - id: file-service
            uri: http://localhost:8084
            predicates:
              - Path=/rest/v1/file/**
          - id: message-service
            uri: http://localhost:8085
            predicates:
              - Path=/rest/v1/email/**
          - id: chat-service
            uri: http://localhost:8086
            predicates:
              - Path=/rest/v1/chat/**

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.cloud.gateway: TRACE

server:
    port: 8090